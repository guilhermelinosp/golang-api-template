---
output: false

pre-commit:
  parallel: true
  commands:
    fmt:
      glob: "*.go"
      run: go fmt ./...
    vet:
      glob: "*.go"
      run: go vet ./...
    tidy:
      run: go mod tidy && git diff --exit-code go.mod go.sum
    test:
      glob: "*.go"
      run: go test -count=1 -race ./...
    lint:
      run: golangci-lint run --fast 2>/dev/null; true
    yamllint:
      glob: "*.{yaml,yml}"
      run: yamllint {staged_files}
    secrets-scan:
      glob: "*.{yaml,yml,go,json,sh}"
      run: gitleaks detect --source . --no-git -v 2>/dev/null; true

commit-msg:
  commands:
    conventional:
      run: grep -Eq '^(feat|fix|docs|style|refactor|perf|test|ci|chore|revert|ops)(\(.+\))?!?: .+' {1}
