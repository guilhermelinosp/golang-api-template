name: pipeline

on:
  push:
    branches: [main]

permissions: write-all

jobs:
  release:
    uses: guilhermelinosp/ci-templates/.github/workflows/release.yml@main
    secrets: inherit

  build:
    needs: [release]
    uses: guilhermelinosp/ci-templates/.github/workflows/go-build.yml@main
    with:
      version: ${{ needs.release.outputs.version }}

  image:
    needs: [build]
    uses: guilhermelinosp/ci-templates/.github/workflows/buildah.yml@main
